<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<meta name="googlebot" content="noindex, nofollow" />
<title>QR Analytics</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="wrap">
  <p class="muted"><a href="/">← Back to generator</a></p>
  <div class="header">
    <div class="logo">
      <img src="/map-logo.png" alt="MAP" onerror="this.style.display='none'" />
    </div>
    <div>
      <h1 id="title">Analytics</h1>
      <div class="muted" id="sub"></div>
      <div class="meta-tags" id="tags"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="total">—</div><div class="lbl">Total scans</div></div>
    <div class="stat"><div class="num" id="today">—</div><div class="lbl">Scans today</div></div>
    <div class="stat"><div class="num" id="last">—</div><div class="lbl">Last scan</div></div>
  </div>

  <div class="card">
    <h3 style="margin:0 0 10px">Scans per day (last 30)</h3>
    <div class="table-wrap">
      <table class="table" id="byday"></table>
    </div>
  </div>

  <div class="card">
    <h3 style="margin:0 0 10px">Recent scans</h3>
    <div class="table-wrap">
      <table class="table" id="recent">
        <thead><tr><th>When</th><th>IP</th><th>User agent</th><th>Referer</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script src="/analytics.js" defer></script>
</body>
</html>
