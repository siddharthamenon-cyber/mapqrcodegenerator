<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<meta name="googlebot" content="noindex, nofollow" />
<title>MAP QR Generator + Analytics</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo-box">
      <img src="/map-logo.png" alt="MAP — Museum of Art &amp; Photography"
           onerror="this.outerHTML='<div class=&quot;fallback&quot;>MAP<small>Museum of Art &amp; Photography</small></div>'" />
    </div>
    <div class="titles">
      <h1>QR Generator</h1>
      <div class="sub">Trackable QR codes with structured naming and built-in scan analytics</div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <form id="form">
        <label for="team">Team</label>
        <select id="team" required>
          <option value="">Select team…</option>
        </select>

        <label for="project">Project name</label>
        <input type="text" id="project" placeholder="e.g. Visible / Invisible exhibition" required />

        <div class="two">
          <div>
            <label for="deployment">Deployment location</label>
            <select id="deployment" required>
              <option value="">Select…</option>
            </select>
          </div>
          <div>
            <label for="deployment_detail">Specifics (optional)</label>
            <input type="text" id="deployment_detail" placeholder="e.g. Gallery 3, Cubbon Park kiosk, IG bio" />
          </div>
        </div>

        <label for="url">Destination URL</label>
        <input type="url" id="url" placeholder="https://map-india.org/..." required />

        <label for="logo">Logo (optional, PNG/JPG, centered on QR)</label>
        <input type="file" id="logo" accept="image/*" />

        <label>Generated QR name</label>
        <div class="preview" id="namePreview"><span class="pill">Fill in the fields above to preview</span></div>

        <div style="margin-top:18px" class="row">
          <button type="submit" id="submit">Generate QR</button>
          <span class="pill">High error-correction so logo doesn't break scanning</span>
        </div>
        <div class="err" id="err"></div>
      </form>
    </div>

    <div class="card">
      <div class="qr" id="qr"><span style="color:var(--muted);font-size:13px">Your QR will appear here</span></div>
      <div class="meta" id="meta"></div>
      <div class="actions" id="actions" style="display:none">
        <a class="btn primary" id="analyticsBtn" href="#">📊 View Analytics</a>
        <a class="btn outline" id="downloadBtn" href="#" download>⬇︎ Download PNG</a>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:20px">
    <div class="row" style="justify-content:space-between">
      <h3 style="margin:0">Your QR codes</h3>
      <button type="button" id="refresh" class="secondary">Refresh</button>
    </div>
    <div class="filters">
      <select id="filterTeam"><option value="">All teams</option></select>
      <select id="filterDeployment"><option value="">All deployments</option></select>
      <input type="text" id="filterSearch" placeholder="Search project…" />
    </div>
    <div class="table-wrap">
      <table class="table" id="codes">
        <thead><tr><th>Team</th><th>Project</th><th>Deployment</th><th>Scans</th><th>Last scan</th><th>Created</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script src="/app.js" defer></script>
</body>
</html>
